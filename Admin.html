<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tournament Admin</title>

<style>

/* SAME STYLE AS ORIGINAL */

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.loginBox{
text-align:center;
margin-bottom:20px;
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

.section{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>
</head>

<body>

<h1>🏆 Tournament Admin</h1>

<div class="loginBox">

<input id="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div class="section">

<h2>Add Team</h2>

<input id="teamName" placeholder="Team Name">
<input type="file" id="teamLogo">

<button onclick="addTeam()">Add Team</button>

<ul id="teamList"></ul>

</div>


<div class="section">

<h2>Add Match</h2>

<select id="team1"></select>
<select id="team2"></select>

<input id="date" placeholder="Date">
<input id="s1" placeholder="Score">
<input id="s2" placeholder="Score">

<button onclick="addMatch()">Save Match</button>

</div>


<div class="section">

<h2>Add Goal</h2>

<input id="playerName" placeholder="Player">
<input id="playerTeam" placeholder="Team">

<button onclick="addGoal()">Add Goal</button>

</div>


<div class="section">

<h2>Add Yellow Card</h2>

<input id="cardName" placeholder="Player">
<input id="cardTeam" placeholder="Team">

<button onclick="addCard()">Add Card</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
apiKey:"AIzaSyAmlSol_3Wmfs53A98sEdEm-uSaByGzo28",
authDomain:"tournament-sys.firebaseapp.com",
projectId:"tournament-sys"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)
const auth=getAuth(app)

window.login=async function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

await signInWithEmailAndPassword(auth,email,password)

alert("Login Success")

}

window.addTeam=async function(){

let name=document.getElementById("teamName").value

await addDoc(collection(db,"teams"),{name:name})

}

window.addMatch=async function(){

await addDoc(collection(db,"matches"),{

team1:team1.value,
team2:team2.value,
date:date.value,
s1:s1.value,
s2:s2.value

})

}

window.addGoal=async function(){

await addDoc(collection(db,"scorers"),{

name:playerName.value,
team:playerTeam.value,
goals:1

})

}

window.addCard=async function(){

await addDoc(collection(db,"cards"),{

name:cardName.value,
team:cardTeam.value,
cards:1

})

}

</script>

</body>
</html>
