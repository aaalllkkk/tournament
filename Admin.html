<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

input{
margin:5px;
padding:6px;
}

button{
padding:6px 10px;
margin:5px;
}

</style>

</head>

<body>

<h1>Admin Login</h1>

<div id="loginBox">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<div id="adminPanel" style="display:none">

<h2>Add Team</h2>

<input id="teamName" placeholder="Team Name">
<input id="teamLogo" placeholder="Logo URL">

<button onclick="addTeam()">Add Team</button>

<h2>Delete Team</h2>

<input id="deleteTeamId" placeholder="Team ID">

<button onclick="deleteTeam()">Delete</button>

<h2>Add Player</h2>

<input id="playerName" placeholder="Player Name">

<button onclick="addPlayer()">Add Player</button>

<h2>Add Goal</h2>

<input id="goalPlayer" placeholder="Player Name">

<button onclick="addGoal()">Add Goal</button>

<h2>Add Yellow Card</h2>

<input id="cardPlayer" placeholder="Player Name">

<button onclick="addCard()">Add Card</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
query,
where,
getDocs,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAmlSol_3Wmfs53A98sEdEm-uSaByGzo28",
authDomain: "tournament-sys.firebaseapp.com",
projectId: "tournament-sys",

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

window.login = async function(){

const email = document.getElementById("email").value;
const pass = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,pass);

}

onAuthStateChanged(auth,user=>{

if(user){

document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";

}

});

window.addTeam = async function(){

const name = document.getElementById("teamName").value;
const logo = document.getElementById("teamLogo").value;

await addDoc(collection(db,"teams"),{

name:name,
logo:logo,
played:0,
win:0,
draw:0,
loss:0,
points:0

});

alert("Team added");

}

window.deleteTeam = async function(){

const id = document.getElementById("deleteTeamId").value;

await deleteDoc(doc(db,"teams",id));

alert("Deleted");

}

window.addPlayer = async function(){

const name = document.getElementById("playerName").value;

await addDoc(collection(db,"players"),{

name:name,
goals:0,
cards:0

});

alert("Player added");

}

window.addGoal = async function(){

const name = document.getElementById("goalPlayer").value;

const q = query(collection(db,"players"),where("name","==",name));

const snap = await getDocs(q);

snap.forEach(async d=>{

const p=d.data();

await updateDoc(doc(db,"players",d.id),{

goals:(p.goals||0)+1

});

});

}

window.addCard = async function(){

const name = document.getElementById("cardPlayer").value;

const q = query(collection(db,"players"),where("name","==",name));

const snap = await getDocs(q);

snap.forEach(async d=>{

const p=d.data();

await updateDoc(doc(db,"players",d.id),{

cards:(p.cards||0)+1

});

});

}

</script>

</body>
</html>
