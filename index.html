<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PILDUN DUNIA😋</title>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
justify-content:center;
flex-wrap:wrap;
}

.tab{
background:#1e293b;
padding:10px 18px;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#38bdf8;
color:black;
}

.section{
display:none;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.section.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border-bottom:1px solid #334155;
padding:8px;
text-align:center;
}

.rank1{color:gold;font-weight:bold;}
.rank2{color:silver;}
.rank3{color:#cd7f32;}

.teamLogo{
width:30px;
height:30px;
object-fit:cover;
border-radius:4px;
margin-right:6px;
}

</style>
</head>

<body>

<h1>PILDUN DUNIA😋</h1>

<div class="tabs">
<div class="tab active" onclick="openTab('standings',event)">Standings</div>
<div class="tab" onclick="openTab('schedule',event)">Matches</div>
<div class="tab" onclick="openTab('scorers',event)">Top Scorer</div>
<div class="tab" onclick="openTab('cards',event)">Yellow Cards</div>
</div>


<div id="standings" class="section active">

<h2>Standings</h2>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>
</thead>

<tbody id="standingsTable"></tbody>

</table>

</div>


<div id="schedule" class="section">

<h2>Matches</h2>

<table>

<thead>
<tr>
<th>Date</th>
<th>Team 1</th>
<th>Score</th>
<th>Team 2</th>
</tr>
</thead>

<tbody id="matchTable"></tbody>

</table>

</div>


<div id="scorers" class="section">

<h2>Top Scorers</h2>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Team</th>
<th>Goals</th>
</tr>
</thead>

<tbody id="scorerTable"></tbody>

</table>

</div>


<div id="cards" class="section">

<h2>Yellow Cards</h2>

<table>
<thead>
<tr>
<th>Player</th>
<th>Team</th>
<th>Cards</th>
<th>Suspended</th>
</tr>
</thead>

<tbody id="cardTable"></tbody>

</table>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyAmlSol_3Wmfs53A98sEdEm-uSaByGzo28",
authDomain:"tournament-sys.firebaseapp.com",
projectId:"tournament-sys"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

function openTab(id,e){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")
e.target.classList.add("active")

}

window.openTab=openTab

async function load(){

const teams=[]
const matches=[]
const scorers=[]
const cards=[]

const t=await getDocs(collection(db,"teams"))
t.forEach(d=>teams.push(d.data()))

const m=await getDocs(collection(db,"matches"))
m.forEach(d=>matches.push(d.data()))

const s=await getDocs(collection(db,"scorers"))
s.forEach(d=>scorers.push(d.data()))

const c=await getDocs(collection(db,"cards"))
c.forEach(d=>cards.push(d.data()))

const matchTable=document.getElementById("matchTable")

matches.forEach(m=>{
matchTable.innerHTML+=`
<tr>
<td>${m.date}</td>
<td>${m.team1}</td>
<td>${m.s1} : ${m.s2}</td>
<td>${m.team2}</td>
</tr>`
})

scorers.sort((a,b)=>b.goals-a.goals)

const sTable=document.getElementById("scorerTable")

scorers.forEach((p,i)=>{

sTable.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.team}</td>
<td>${p.goals}</td>
</tr>`
})

const cTable=document.getElementById("cardTable")

cards.forEach(p=>{

let suspend=p.cards>=3?"YES":""

cTable.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.team}</td>
<td>${p.cards}</td>
<td>${suspend}</td>
</tr>`
})

}

load()

</script>

</body>
</html>
