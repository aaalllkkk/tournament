<!DOCTYPE html>
<html>
<head>
<title>League Standings</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:80%;
}

th,td{
border:1px solid #555;
padding:8px;
}

th{
background:#333;
}

.team-logo{
width:25px;
height:25px;
vertical-align:middle;
margin-right:6px;
}
</style>

</head>

<body>

<h1>League Standings</h1>

<table id="standings">
<tr>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>Pts</th>
</tr>
</table>

<h2>Top Scorers</h2>

<table id="scorers">
<tr>
<th>Player</th>
<th>Goals</th>
</tr>
</table>

<h2>Yellow Cards</h2>

<table id="cards">
<tr>
<th>Player</th>
<th>Cards</th>
<th>Status</th>
</tr>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAmlSol_3Wmfs53A98sEdEm-uSaByGzo28",
authDomain: "tournament-sys.firebaseapp.com",
projectId: "tournament-sys",

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

loadTeams();
loadPlayers();

async function loadTeams(){

const snapshot = await getDocs(collection(db,"teams"));

const table = document.getElementById("standings");

snapshot.forEach(doc=>{

const t = doc.data();

const row = table.insertRow();

row.innerHTML=`

<td>
<img class="team-logo" src="${t.logo}">
${t.name}
</td>

<td>${t.played||0}</td>
<td>${t.win||0}</td>
<td>${t.draw||0}</td>
<td>${t.loss||0}</td>
<td>${t.points||0}</td>

`;

});

}

async function loadPlayers(){

const snapshot = await getDocs(collection(db,"players"));

const scorers = document.getElementById("scorers");

const cards = document.getElementById("cards");

snapshot.forEach(doc=>{

const p = doc.data();

let srow = scorers.insertRow();

srow.innerHTML = `
<td>${p.name}</td>
<td>${p.goals||0}</td>
`;

let suspended = (p.cards||0)>=3 ? "Suspended" : "OK";

let crow = cards.insertRow();

crow.innerHTML = `
<td>${p.name}</td>
<td>${p.cards||0}</td>
<td>${suspended}</td>
`;

});

}

</script>

</body>
</html>
