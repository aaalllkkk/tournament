<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PILDUN DUNIA 😋</title>

<style>

/* SAME DESIGN AS YOUR ORIGINAL */

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
justify-content:center;
flex-wrap:wrap;
}

.tab{
background:#1e293b;
padding:10px 18px;
cursor:pointer;
border-radius:6px;
}

.tab.active{
background:#38bdf8;
color:black;
}

.section{
display:none;
background:#1e293b;
padding:20px;
border-radius:10px;
}

.section.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border-bottom:1px solid #334155;
padding:8px;
text-align:center;
}

.teamLogo{
width:30px;
height:30px;
object-fit:cover;
border-radius:4px;
margin-right:6px;
}

</style>
</head>

<body>

<h1> PILDUN DUNIA 😋 </h1>

<div class="tabs">
<div class="tab active" onclick="openTab('teams',event)">Teams</div>
<div class="tab" onclick="openTab('schedule',event)">Schedule</div>
<div class="tab" onclick="openTab('standings',event)">Standings</div>
</div>

<div id="teams" class="section active">

<ul id="teamList"></ul>

</div>

<div id="schedule" class="section">

<table>

<thead>
<tr>
<th>Date</th>
<th>Team 1</th>
<th>Score</th>
<th>Team 2</th>
</tr>
</thead>

<tbody id="matchTable"></tbody>

</table>

</div>

<div id="standings" class="section">

<table>

<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>P</th>
<th>W</th>
<th>D</th>
<th>L</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
<th>Pts</th>
</tr>
</thead>

<tbody id="standingsTable"></tbody>

</table>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAmlSol_3Wmfs53A98sEdEm-uSaByGzo28",
authDomain:"tournament-sys.firebaseapp.com",
projectId:"tournament-sys"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

let teams=[]
let matches=[]

function openTab(id,e){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")
e.target.classList.add("active")

}

async function loadTeams(){

teams=[]

const querySnapshot=await getDocs(collection(db,"teams"))

querySnapshot.forEach(doc=>{
teams.push(doc.data())
})

renderTeams()

}

function renderTeams(){

let teamList=document.getElementById("teamList")
teamList.innerHTML=""

teams.forEach(t=>{

let logo=t.logo?`<img class="teamLogo" src="${t.logo}">`:""

teamList.innerHTML+=`
<li>${logo}${t.name}</li>
`

})

}

window.openTab=openTab

loadTeams()

</script>

</body>
</html>
